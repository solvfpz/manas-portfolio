
<!DOCTYPE html>
<html lang="en" class="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manas Kale | Web Developer</title>
    <meta name="description" content="A minimalist, developer-focused portfolio featuring work experience, projects, open-source contributions, and blog posts with a clean aesthetic.">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&family=Geist+Mono:wght@100..900&family=Playfair+Display:ital,wght@1,900&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Space Grotesk', 'sans-serif'],
              mono: ['Geist Mono', 'monospace'],
              serif: ['Playfair Display', 'serif'],
            },
            colors: {
              background: 'hsl(var(--background))',
              foreground: 'hsl(var(--foreground))',
              card: 'hsl(var(--card))',
              muted: 'hsl(var(--muted))',
              border: 'hsl(var(--border))',
              primary: 'hsl(var(--primary))',
              accent: 'hsl(var(--accent))',
            }
          }
        }
      }
    </script>
    <style type="text/css">
      :root {
        --background: 0 0% 100%;
        --foreground: 0 0% 3.9%;
        --card: 0 0% 100%;
        --muted: 0 0% 96.1%;
        --border: 0 0% 89.8%;
        --primary: 0 0% 9%;
        --accent: 0 0% 96.1%;
      }
      .dark {
        --background: 0 0% 3.9%;
        --foreground: 0 0% 98%;
        --card: 0 0% 3.9%;
        --muted: 0 0% 14.9%;
        --border: 0 0% 14.9%;
        --primary: 0 0% 98%;
        --accent: 0 0% 14.9%;
      }
      body {
        background-color: hsl(var(--background));
        color: hsl(var(--foreground));
        transition: background-color 0.5s ease-in-out, color 0.5s ease-in-out;
      }
      
      /* Global transition for background-color and color to make theme changes smooth */
      *, *::before, *::after {
        transition-property: background-color, border-color, color, text-decoration-color, fill, stroke;
        transition-duration: 0.3s;
        transition-timing-function: ease-in-out;
      }

      /* View Transitions Circular Reveal - Modern Setup */
      ::view-transition-old(root),
      ::view-transition-new(root) {
        animation: none;
        mix-blend-mode: normal;
      }

      /* Ensure the new layer is above the old one */
      ::view-transition-new(root) {
        z-index: 999;
      }
      ::view-transition-old(root) {
        z-index: 1;
      }

      /* Grainy texture simulation */
      .texture-overlay {
        background-image: url("https://www.transparenttextures.com/patterns/groovepaper.png");
        pointer-events: none;
        position: fixed;
        inset: 0;
        opacity: 0.05;
        z-index: 9999;
      }

      /* Restoration support for 'bad darkmode' - if you hate this, I will remove these transitions */
    </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react-router-dom": "https://esm.sh/react-router-dom@^7.13.0",
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
    "framer-motion": "https://esm.sh/framer-motion@^12.31.0"
  }
}
</script>
</head>
  <body>
    <div class="texture-overlay"></div>
    <div id="root"></div>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
